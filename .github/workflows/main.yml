name: Efficiency of App

on:
  push: 
    branches: [develop]
  pull_request: 
    branches: [main]


jobs:
  style_code:
    runs-on: ubuntu-latest
    steps:
      - name: Clonning Dir
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Black
        run: pip install black

      - name: Check format by Black
        run: black --check main.py app/

  jumpstart_app:
    runs-on: ubuntu-latest
    needs: style_code
    steps:
      - name: Clonning Dir
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Jumpstart App
        run: |
          timeout 30 python3 main.py &
          sleep 5
          if curl -f -s http://127.0.0.1:8000/docs > /dev/null; 
          then
            echo "✅ Server is running"
          else
            echo "❌ Server failed to start"
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi
        shell: bash



